  .app-root {
    min-height: 100vh;
    background: #FDFBFF;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(246,199,223,0.05), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(190,220,240,0.06), transparent 45%);
    color: #3A3140;
    font-family: 'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic', 'YuGothic', 'Meiryo', 'Noto Sans JP', 'Noto Sans CJK JP', system-ui, sans-serif;
    padding-bottom: 40px;
    position: relative;
  }

  /* p\xE9talos flotando de fondo, muy sutiles, para ambientar sin distraer */
  .petals-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .petal {
    position: absolute;
    top: -20px;
    display: block;
    border-radius: 0 60% 0 60%;
    opacity: 0;
    animation-name: petalFall;
    animation-timing-function: ease-in;
    animation-iteration-count: infinite;
  }
  @keyframes petalFall {
    0% { transform: translateY(-6vh) rotate(0deg); opacity: 0; }
    8% { opacity: 0.32; }
    92% { opacity: 0.22; }
    100% { transform: translateY(106vh) rotate(320deg); opacity: 0; }
  }

  .app-header {
    padding: 20px 16px 0 16px;
    max-width: 720px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .brand-jp {
    font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', 'YuMincho', 'Noto Serif JP', 'Noto Serif CJK JP', serif;
    font-weight: 700;
    font-size: 26px;
    color: #3A3140;
    letter-spacing: 0.02em;
  }
  .brand-es {
    font-size: 12.5px;
    color: #8B7E99;
  }

  /* l\xEDnea decorativa fina en degradado pastel, discreta */
  .header-line {
    height: 4px;
    border-radius: 3px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #F6C7DF, #D6C5EC 35%, #BEDCF0 68%, #F3E3A0);
    opacity: 0.55;
  }

  /* banner de aviso persistente cuando hay cambios sin exportar */
  .unsaved-banner {
    background: #FBF3D0;
    border: 1px solid #F3E3A0;
    color: #7A631E;
    font-size: 12.5px;
    padding: 8px 12px;
    border-radius: 7px;
    margin-bottom: 10px;
    line-height: 1.4;
  }

  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid #EEE3F1;
  }
  .tab {
    position: relative;
    flex: 1;
    background: transparent;
    border: none;
    padding: 8px 4px 10px 4px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    color: #8B7E99;
    border-bottom: 2px solid transparent;
    font-family: inherit;
  }
  .tab-jp {
    font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', 'YuMincho', 'Noto Serif JP', 'Noto Serif CJK JP', serif;
    font-size: 15px;
  }
  .tab-es {
    font-size: 10.5px;
  }
  .tab-active {
    color: #B0447F;
    border-bottom: 2px solid #B0447F;
  }
  .tab-badge {
    position: absolute;
    top: 2px;
    right: 14%;
    background: #B0447F;
    color: #FFF;
    font-size: 10px;
    font-weight: 700;
    line-height: 1;
    padding: 2px 5px;
    border-radius: 999px;
    min-width: 14px;
    text-align: center;
  }

  .app-main {
    max-width: 720px;
    margin: 0 auto;
    padding: 18px 16px 0 16px;
    position: relative;
    z-index: 1;
  }

  .loading { color: #8B7E99; text-align: center; padding: 40px 0; }

  .screen { display: flex; flex-direction: column; gap: 16px; }

  .card {
    background: #FFFFFF;
    border: 1px solid #EEE3F1;
    border-radius: 10px;
    padding: 18px;
    /* relative para que capas absolutas (confeti del resumen) se anclen a la tarjeta */
    position: relative;
  }

  .card-title {
    font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', 'YuMincho', 'Noto Serif JP', 'Noto Serif CJK JP', serif;

  .card-title-row {

    margin-bottom: 14px;

  .subtitle {
    font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', 'YuMincho', 'Noto Serif JP', 'Noto Serif CJK JP', serif;
    font-size: 15px;
    margin: 14px 0 8px 0;

  /* forms */

  .field-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;

  .field-full { grid-column: 1 / -1; }
  input, .field-full-input, .notes-textarea {

    font-size: 15px;

    box-sizing: border-box;

  input:focus, .field-full-input:focus, .notes-textarea:focus {
    outline: none;
    border-color: #D6A7C7;
  }
  .form-error {
    color: #B0447F;
    font-size: 13px;
    margin: 0;
  }

  .search {
    max-width: 200px;
  }

  .btn {
    font-family: inherit;
    font-size: 14px;
    padding: 9px 16px;
    border-radius: 7px;
    border: 1px solid #E5DCEE;
    background: #FFFDFC;
    color: #3A3140;
    cursor: pointer;
    transition: box-shadow 0.2s ease, transform 0.15s ease;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary {
    background: #3A3140;
    color: #FDFBFF;
    border-color: #3A3140;
  }
  .btn-primary:hover:not(:disabled) {

    transform: translateY(-1px);
  }
  .btn-small { padding: 5px 10px; font-size: 12.5px; }
  .btn-danger { background: #E0728E; border-color: #E0728E; color: #FFF; }
  .btn-ghost-danger { color: #B0447F; border-color: transparent; background: transparent; }
  .confirm-text { font-size: 12.5px; color: #8B7E99; }

  .empty { color: #8B7E99; font-size: 14px; }

  .backup-card { padding: 14px 18px; }
  .tags-card { padding: 14px 18px; }
  .backup-toggle {
    background: transparent;
    border: none;

  .backup-body { margin-top: 14px; display: flex; flex-direction: column; gap: 16px; }

  .tag-create-row { display: flex; gap: 8px; }

  .tags-manage-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }

  .tags-manage-row:last-child { border-bottom: none; }

  .es-meanings-editor { display: flex; flex-direction: column; gap: 8px; }

  .typ-value.romaji { font-style: italic; color: #6A5E78; }

  .error-tag {

  .row-actions { display: flex; gap: 6px; align-items: center; }
  .word-edit { display: flex; flex-direction: column; gap: 8px; width: 100%; }

  /* config */
  .config-block { margin-bottom: 16px; }

  /* practice */
  .practice-card { position: relative; text-align: center; padding: 26px 18px; }
  .practice-top {
    display: flex;

    align-items: center;

  /* racha de aciertos, con un peque\xF1o rebote cada vez que sube */
  .streak-badge {
    font-size: 12.5px;
    color: #A08A2E;
    background: #FBF3D0;

  }
  @keyframes streakPulse {
    0% { transform: scale(0.85); }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  .question-box { margin: 10px 0 24px 0; }
  .question-jp {
    font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', 'YuMincho', 'Noto Serif JP', 'Noto Serif CJK JP', serif;
    font-size: 34px;
    line-height: 1.3;

  }
  .question-romaji-sub {
    display: block;
    font-style: italic;
    font-size: 16px;
    color: #8B7E99;
    margin-top: 6px;
  }
  .answer-input {
    text-align: center;
    font-size: 18px;
    max-width: 320px;
    margin: 0 auto;
    display: block;
  }

  .choice-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-width: 460px;

  .choice-btn {
    font-family: inherit;

    background: #FFFDFC;
    color: #3A3140;

  .choice-btn:disabled { cursor: default; }
  .choice-correct { background: #E6F2E0; border-color: #5C8A54; color: #4B7A44; font-weight: 700; }
  .choice-wrong { background: #FBE4E9; border-color: #E0728E; color: #B0447F; }

  .flashcard-area { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .flashcard-answer {
    font-size: 20px;
    font-weight: 600;
    color: #6C5FC7;
    margin: 0;
  }
  .flashcard-grade-row { justify-content: center; }

  .feedback { margin-top: 16px; font-size: 16px; font-weight: 700; }
  .feedback-icon { font-size: 18px; }
  .feedback-ok { color: #5C8A54; }
  .feedback-bad { color: #B0447F; }
  .feedback-hint-standalone { color: #C4B7D4; font-size: 12px; }
  .wait-hint { color: #B0447F; font-size: 12.5px; }

  /* Ficha completa de la palabra/frase en el feedback: todas las formas */
  .feedback-full-card {
    margin: 10px auto 0 auto;
    max-width: 560px;
    background: #FAF6FC;
    border: 1px solid #EADFF0;
    border-radius: 10px;
    padding: 10px 12px;
  }
  .word-full-forms {
    display: inline-flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }
  .form-chip {
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    background: #FFFFFF;
    border: 1px solid #EADFF0;
    border-radius: 8px;
    padding: 4px 9px;
    min-width: 64px;
  }
  .form-chip-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #A79ABA;
    font-weight: 700;
  }
  .form-chip-value {
    font-size: 15px;
    color: #4A3B5C;
  }
  .form-kanji .form-chip-value {
    font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', 'YuMincho', 'Noto Serif JP', 'Noto Serif CJK JP', serif;
    font-size: 17px;
  }
  .form-hiragana .form-chip-label { color: #7FA65C; }
  .form-katakana .form-chip-label { color: #5C8AA6; }
  .form-romaji .form-chip-value { font-style: italic; color: #8B7E99; }
  .form-es {
    border-color: #E7D6EE;
    background: #F6EBF9;
  }
  .form-es .form-chip-label { color: #A85CB8; }
  .form-es .form-chip-value { font-weight: 600; }
  .fail-list-full { margin-bottom: 10px; }

  /* ---- mini-formato de texto (lecciones de gram\xE1tica) ---- */
  .grammar-rich .rt-h2 {
    margin: 14px 0 6px 0;
    font-size: 17px;
    color: #6C5FC7;
    border-left: 4px solid #B9A6E8;
    background: #F5F1FC;
    padding: 4px 10px;
    border-radius: 0 8px 8px 0;
  }
  .grammar-rich .rt-h2:first-child { margin-top: 0; }
  .grammar-rich .rt-h3 {
    margin: 10px 0 4px 0;
    font-size: 14.5px;
    color: #A85CB8;
    border-bottom: 1px dashed #E7D6EE;
    padding-bottom: 2px;
  }
  .grammar-rich .rt-p { margin: 3px 0; }
  .grammar-rich .rt-space { height: 8px; }
  .grammar-rich .rt-bullets { margin: 4px 0 4px 4px; padding-left: 18px; }
  .grammar-rich .rt-bullets li { margin: 2px 0; }
  .grammar-rich strong { color: #4A3B5C; }
  .grammar-rich u { text-decoration-color: #B9A6E8; text-decoration-thickness: 2px; }
  .rt-mark {
    background: #FDF0B8;
    border-radius: 3px;
    padding: 0 3px;
  }
  .grammar-section-label {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-radius: 6px;
    padding: 3px 9px;
    margin-bottom: 6px;
  }
  .grammar-section-examples { background: #EAF3E2; color: #5C8A54; }
  .grammar-section-dialog { background: #E2ECF3; color: #4A7A9B; }
  .grammar-dialog-line {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 0;
  }
  .grammar-dialog-all { margin-top: 6px; }

  /* ---- editor de formato (RichTextEditor) ---- */
  .rte-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 6px;
  }
  .rte-btn {
    border: 1px solid #E0D3EA;
    background: #FFFFFF;
    color: #6B5B80;
    border-radius: 7px;
    padding: 4px 10px;
    font-size: 12.5px;
    cursor: pointer;
  }
  .rte-btn:hover { background: #F5F1FC; }
  .rte-btn-h2 { font-weight: 800; color: #6C5FC7; }
  .rte-btn-h3 { font-weight: 700; color: #A85CB8; }
  .rte-btn-b { font-weight: 800; }
  .rte-btn-i { font-style: italic; }
  .rte-btn-u { text-decoration: underline; }
  .rte-btn-mark { background: #FDF0B8; }
  .rte-btn-active { background: #EFE7FB; border-color: #B9A6E8; }
  .rte-preview {
    margin-top: 8px;
    border: 1px dashed #D9C9E8;
    border-radius: 10px;
    padding: 10px 12px;
    background: #FDFBFF;
  }
  .rte-preview-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #A79ABA;
    font-weight: 700;
    margin-bottom: 4px;
  }

  /* ---- Di\xE1logos (frases) ---- */
  .phrase-question { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .phrase-replay {
    border: 1px solid #E0D3EA;
    background: #FFFFFF;
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 15px;
    cursor: pointer;
    color: #6B5B80;
  }
  .phrase-replay:hover { background: #F5F1FC; }
  .phrase-romaji-line {
    font-style: italic;
    font-size: 18px;
    color: #6B5B80;
    margin: 2px 0 0 0;
  }
  .phrase-audio-hint { margin: 0; }
  .phrase-choices { margin-top: 12px; }
  .phrase-write-area { margin-top: 12px; }
  .phrase-write-input {
    width: 100%;
    box-sizing: border-box;
    border: 1px solid #E0D3EA;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
  }
  .phrase-write-input:focus { outline: 2px solid #B9A6E8; }
  .phrase-reveal-card { text-align: center; }
  .phrase-your-text { font-size: 13.5px; color: #6B5B80; margin: 8px 0 0 0; }
  .phrase-mastered-note { font-size: 13px; color: #8A6C4E; margin: 6px 0 0 0; }
  .phrase-selfeval { margin-top: 10px; }
  .phrase-level-chip {
    font-size: 12px;
    background: #F0E8F7;
    color: #6B5B80;
    border-radius: 999px;
    padding: 3px 10px;
    font-weight: 700;
  }
  .phrase-level-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
  .phrase-level-row { display: flex; align-items: center; gap: 10px; }
  .phrase-level-name { min-width: 130px; font-size: 13.5px; font-weight: 600; color: #4A3B5C; }
  .phrase-level-bar { flex: 1; }
  .phrase-level-count { font-size: 12.5px; color: #8B7E99; white-space: nowrap; }

  /* ---- gr\xE1fica de evoluci\xF3n (estad\xEDsticas) ---- */
  .evo-chart-wrap { width: 100%; }
  .evo-chart { width: 100%; height: auto; display: block; }
  .evo-grid { stroke: #F0E8F7; stroke-width: 1; }
  .evo-grid-70 { stroke: #C9BBE0; stroke-dasharray: 4 4; }
  .evo-grid-90 { stroke: #D9B24C; stroke-dasharray: 4 4; }
  .evo-axis-label { font-size: 10px; fill: #A79ABA; }
  .evo-line { stroke: #6C5FC7; stroke-width: 2.5; stroke-linejoin: round; stroke-linecap: round; }
  .evo-dot { stroke: #FFFFFF; stroke-width: 1.5; }
  .evo-dot-good { fill: #6C5FC7; }
  .evo-dot-bad { fill: #E0728E; }
  .evo-legend { margin-top: 4px; }

  /* ---- dictado ---- */
  .dictation-question { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .notes-hint {
    font-size: 13px;
    color: #8A6C4E;
    background: #FBF3D0;
    border: 1px solid #F3E3A0;
    border-radius: 6px;
    padding: 6px 10px;
    margin: 10px auto 0 auto;
    max-width: 420px;
  }

  /* sello de acierto/fallo con un peque\xF1o estallido de chispas */
  .stamp-wrap {
    position: absolute;
    top: 18px;
    right: 22px;
    pointer-events: none;
  }
  .stamp-mark {
    display: block;
    font-size: 44px;
    font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', 'YuMincho', 'Noto Serif JP', 'Noto Serif CJK JP', serif;
    animation: stampIn 0.45s ease-out;
    transform: rotate(-8deg);
  }
  .stamp-ok .stamp-mark { color: #6C5FC7; }
  .stamp-bad .stamp-mark { color: #B0447F; }
  @keyframes stampIn {
    0% { opacity: 0; transform: scale(1.8) rotate(-8deg); }
    60% { opacity: 1; }
    100% { opacity: 1; transform: scale(1) rotate(-8deg); }
  }
  .spark-burst {
    position: absolute;
    inset: -10px;
  }
  .spark {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #F3E3A0;
    opacity: 0;
    animation: sparkOut 0.6s ease-out forwards;
    animation-delay: calc(var(--i) * 0.02s);
  }
  @keyframes sparkOut {
    0% { opacity: 0.9; transform: translate(-50%, -50%) rotate(calc(var(--i) * 60deg)) translateY(-6px) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) rotate(calc(var(--i) * 60deg)) translateY(-40px) scale(0.4); }
  }

  .summary-stamp { margin: 6px 0 16px 0; }
  .summary-percent {
    font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', 'YuMincho', 'Noto Serif JP', 'Noto Serif CJK JP', serif;
    font-size: 48px;
    font-weight: 700;
  }
  .summary-percent.good { color: #6C5FC7; }
  .summary-percent.bad { color: #B0447F; }
  .summary-line { color: #8B7E99; margin-bottom: 4px; }
  .unlock-banner {
    font-size: 13.5px;
    font-weight: 700;
    background: linear-gradient(90deg, #B0447F, #6C5FC7, #3E7CA6);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 4px 0 14px 0;
  }
  .fail-list { list-style: none; padding: 0; margin: 0 0 16px 0; display: flex; flex-direction: column; gap: 8px; }

  /* stats */
  /* Rejilla uniforme: los bloques se reparten en columnas iguales y, si no
     caben, saltan de fila TODOS con el mismo ancho (nada de l\xEDneas cojas). */
  .stats-summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    text-align: center;
    gap: 12px;
  }
  .stat-block {
    display: flex;
    flex-direction: column;
    gap: 4px;
    justify-content: flex-start;
    padding: 6px 4px;
    border-radius: 10px;
    background: #FAF6FC;
    border: 1px solid #F2E9F5;
  }
  .stat-number { font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', 'YuMincho', 'Noto Serif JP', 'Noto Serif CJK JP', serif; font-size: 26px; font-weight: 700; }
  .stat-label { font-size: 11.5px; color: #8B7E99; }

  .reset-card { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .reset-since { font-size: 12.5px; color: #8B7E99; }
  .reset-confirm-row { flex-wrap: wrap; justify-content: flex-end; }

  .exam-history-list, .word-stat-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
  .exam-history-row { display: flex; align-items: center; gap: 10px; font-size: 13px; flex-wrap: wrap; row-gap: 4px; }
  .exam-date { width: 60px; color: #8B7E99; flex-shrink: 0; }
  .exam-bar-track { flex: 1; background: #F6EEFB; border-radius: 4px; height: 8px; overflow: hidden; }
  .exam-bar-fill { height: 100%; }
  .exam-bar-fill.good { background: #6C5FC7; }
  .exam-bar-fill.bad { background: #E0728E; }
  .exam-score { width: 90px; text-align: right; flex-shrink: 0; color: #8B7E99; }

  /* Dise\xF1o consistente por palabra: primera l\xEDnea SIEMPRE la ficha con las
     formas japonesas; segunda l\xEDnea SIEMPRE los n\xFAmeros, con separadores
     fijos. As\xED todas las filas se leen igual y nada baila de l\xEDnea. */
  .word-stat-row {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 7px;
    padding: 9px 0;
    border-bottom: 1px solid #F2E9F5;
  }
  .word-stat-row:last-child { border-bottom: none; }
  .word-stat-numbers {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    color: #8B7E99;
    flex-wrap: wrap;
    row-gap: 4px;
  }
  .word-stat-numbers > * {
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
  }
  .word-stat-numbers > *:not(:last-child)::after {
    content: "\xB7";
    margin-left: 8px;
    color: #DACFE5;
  }
  .percent-tag { font-weight: 700; }
  .percent-tag.good { color: #5C8A54; }
  .percent-tag.bad { color: #B0447F; }

  /* estad\xEDsticas agrupadas por categor\xEDa (etiqueta), desplegables */
  .tag-stat-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; }
  .tag-stat-group { border-bottom: 1px solid #F2E9F5; }
  .tag-stat-group:last-child { border-bottom: none; }
  .tag-stat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 9px 4px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    color: #3A3140;
    text-align: left;
    flex-wrap: wrap;
    border-radius: 8px;
    transition: background 0.15s ease;
  }
  .tag-stat-header:hover { background: #FAF6FC; }
  .tag-stat-chevron { color: #C4B7D4; width: 12px; flex-shrink: 0; }
  .tag-stat-count { color: #8B7E99; font-size: 12px; white-space: nowrap; }
  .tag-stat-bar { flex: 1; min-width: 70px; max-width: 180px; display: inline-block; }
  .tag-stat-fails { color: #B0447F; font-size: 12px; font-weight: 700; white-space: nowrap; }
  .tag-stat-nodata { color: #C4B7D4; font-size: 12px; font-style: italic; }
  .tag-stat-detail {
    padding: 4px 6px 12px 26px;
    animation: fadeSlideIn 0.18s ease-out;
  }
  .tag-stat-unpracticed { margin-top: 8px; }
  .fail-count { white-space: nowrap; }
  .fail-count.has-fails { color: #B0447F; font-weight: 700; }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(-3px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* barra de nivel de dominio con degradado pastel discreto */
  .srs-rank { display: flex; align-items: center; gap: 6px; font-size: 11px; }
  .srs-rank-label { color: #8B7E99; white-space: nowrap; }
  .srs-bar-track {
    width: 54px;
    height: 6px;
    background: #F6EEFB;
    border-radius: 999px;
    overflow: hidden;
    display: inline-block;
  }
  .srs-bar-fill {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, #F6C7DF, #D6C5EC, #BEDCF0);
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .srs-next-tag { font-size: 11px; color: #C4B7D4; }

  .file-confirm-row { flex-wrap: wrap; }

  /* toggle de categor\xEDa cerrada en el gestor de etiquetas */
  .closed-toggle { font-size: 11.5px; padding: 3px 10px; }

  /* ---------- modo definitivo (tema dorado desbloqueable) ---------- */
  .ultimate-toggle {
    margin-left: 12px;
    font-size: 11.5px;
    font-weight: 700;
    border: 1px solid #E8D9A8;
    border-radius: 999px;
    padding: 3px 12px;
    background: #FDF8E8;
    color: #A08A2E;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .ultimate-toggle:hover { background: #FBF3D0; }
  .ultimate-toggle-on {
    background: linear-gradient(90deg, #F3D46A, #E8B84B);
    border-color: #D9A93C;
    color: #6B531B;
    box-shadow: 0 0 8px rgba(232, 184, 75, 0.45);
  }
  .ultimate-on {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(240,199,94,0.10), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(232,184,75,0.10), transparent 45%);
  }
  .ultimate-on .brand-jp {
    background: linear-gradient(90deg, #B8860B, #E8B84B, #B8860B);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .ultimate-on .header-line {
    background: linear-gradient(90deg, transparent, #E8B84B, transparent);
  }
  .petal-gold { box-shadow: 0 0 6px rgba(240, 199, 94, 0.6); }

  /* confeti dorado del resumen de examen con >=90% */
  .confetti-layer {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .confetti-piece {
    position: absolute;
    top: -12px;
    border-radius: 2px;
    opacity: 0;
    animation: confettiFall 2.6s ease-in forwards;
  }
  @keyframes confettiFall {
    0% { opacity: 0; transform: translateY(0) rotate(0deg); }
    10% { opacity: 1; }
    100% { opacity: 0; transform: translateY(340px) rotate(540deg); }
  }

  /* indicador honesto del estado del guardado autom\xE1tico */
  .autosave-badge {
    font-size: 11px;
    font-weight: 700;
    border-radius: 999px;
    padding: 2px 10px;
    margin-left: 10px;
    vertical-align: middle;
  }
  .autosave-on { background: #EAF3E7; color: #5C8A54; }
  .autosave-off { background: #FBE9F2; color: #B0447F; }

  /* ---------- audio ---------- */
  .speak-btn {
    background: none;
    border: 1px solid #EEE3F1;
    border-radius: 999px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 4px 8px;
    margin-left: 8px;
    vertical-align: middle;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .speak-btn:hover { background: #FAF6FC; }
  .speak-btn:active { transform: scale(0.92); }
  .speak-btn-big { font-size: 18px; padding: 5px 10px; }

  /* ---------- gram\xE1tica ---------- */
  .grammar-form { display: flex; flex-direction: column; gap: 14px; }
  .grammar-textarea {
    width: 100%;
    box-sizing: border-box;
    resize: vertical;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.6;
    padding: 10px;
    border: 1px solid #EEE3F1;
    border-radius: 8px;
    color: #3A3140;
  }
  .field-label { font-size: 12.5px; color: #8B7E99; display: block; margin-bottom: 4px; }
  .grammar-example-edit { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .grammar-example-edit input { flex: 1; min-width: 0; }
  .saved-flash { color: #5C8A54; font-weight: 700; font-size: 13.5px; margin-top: 10px; }

  .grammar-filter-row { margin-bottom: 14px; }
  .grammar-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
  .grammar-lesson { border-bottom: 1px solid #F2E9F5; padding-bottom: 6px; }
  .grammar-lesson:last-child { border-bottom: none; }
  .grammar-pinned { background: #FDFAF3; border-radius: 8px; }
  .grammar-lesson-header {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    width: 100%;
    padding: 10px 6px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    border-radius: 8px;
    transition: background 0.15s ease;
  }
  .grammar-lesson-header:hover { background: #FAF6FC; }
  .grammar-lesson-title { font-weight: 700; font-size: 14.5px; color: #3A3140; }
  .grammar-snippet {
    flex-basis: 100%;
    font-size: 12.5px;
    color: #8B7E99;
    padding-left: 20px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .grammar-lesson-body { padding: 4px 8px 12px 26px; animation: fadeSlideIn 0.18s ease-out; }
  /* la explicaci\xF3n conserva p\xE1rrafos y saltos de l\xEDnea tal cual se escribieron */
  .grammar-explanation {
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.7;
    color: #3A3140;
    margin-bottom: 14px;
  }
  .grammar-examples ul { list-style: none; padding: 0; margin: 6px 0 14px 0; display: flex; flex-direction: column; gap: 8px; }
  .grammar-example { display: flex; flex-direction: column; gap: 2px; padding: 8px 10px; background: #FAF6FC; border-radius: 8px; }
  .grammar-example-jp {
    font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', 'YuMincho', 'Noto Serif JP', 'Noto Serif CJK JP', serif;
    font-size: 16px;
    color: #3A3140;
  }
  .grammar-example-es { font-size: 13px; color: #8B7E99; }
  .grammar-dialog { margin-bottom: 14px; }
  .grammar-dialog-text {
    white-space: pre-wrap;
    font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', 'Yu Mincho', 'YuMincho', 'Noto Serif JP', 'Noto Serif CJK JP', serif;
    font-size: 15px;
    line-height: 1.9;
    color: #3A3140;
    background: #FAF6FC;
    border-left: 3px solid #D6C5EC;
    border-radius: 0 8px 8px 0;
    padding: 10px 12px;
    margin-top: 6px;
  }
  .grammar-lesson-actions { align-items: center; }
  .grammar-date { font-size: 12px; color: #C4B7D4; margin-right: auto; }

  @media (max-width: 480px) {
    .field-grid { grid-template-columns: 1fr; }
    .question-jp { font-size: 26px; }
    .card-title-row { flex-direction: column; align-items: flex-start; }
    .search { max-width: 100%; width: 100%; }
    .word-full-grid { grid-template-columns: repeat(2, 1fr); }
    .choice-grid { grid-template-columns: 1fr; }
    /* con cinco pesta\xF1as, compactar un poco para que quepan sin desbordar */
    .tab { padding: 8px 2px 10px 2px; }
    .tab-jp { font-size: 14px; }
    .tab-es { font-size: 9.5px; }
    /* estad\xEDsticas por categor\xEDa: barra m\xE1s corta y detalle menos sangrado */
    .tag-stat-bar { max-width: 90px; min-width: 50px; }
    .tag-stat-detail { padding-left: 10px; }
    /* con siete pesta\xF1as ya no caben todas: se permite desplazarlas */
    .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab { flex-shrink: 0; min-width: 64px; }
    .grammar-lesson-body { padding-left: 10px; }
    .grammar-example-edit { flex-wrap: wrap; }
  }
